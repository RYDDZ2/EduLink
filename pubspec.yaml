name: edulink
description: EduLink - Peer Tutoring Marketplace for SDG 4 Quality Education
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  http: ^1.6.0
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^33.2.12
  flutter_dotenv: ^6.0.1
  supabase_flutter: ^2.8.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
